<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An immersive hyperspace jump journey through the cosmos. You drive." />
    <meta property="og:title" content="Nebula Cruise" />
    <meta property="og:description" content="An immersive hyperspace jump journey through the cosmos. You drive." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nebula-cruise.vercel.app" />
    <meta property="og:image" content="https://nebula-cruise.vercel.app/images/nebula-cruise-screenshot.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nebula-cruise.vercel.app/images/nebula-cruise-screenshot.jpg" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <title>Nebula Cruise | An immersive hyperspace jump journey through the cosmos</title>
  </head>
  <body>
    <div class="scene">
      <div class="wrap">
        <div class="wall wall-right"></div>
        <div class="wall wall-left"></div>
        <div class="wall wall-top"></div>
        <div class="wall wall-bottom"></div>
        <div class="wall wall-back"></div>
      </div>
      <div class="wrap">
        <div class="wall wall-right"></div>
        <div class="wall wall-left"></div>
        <div class="wall wall-top"></div>
        <div class="wall wall-bottom"></div>
        <div class="wall wall-back"></div>
      </div>
    </div>
    <canvas id="stars"></canvas>
    <div class="overlay" id="overlay">
      <h1>🚀 Nebula Cruise</h1>
      <p class="overlay-warning">
        ⚠️ Fast-moving, flashing visuals ahead. If you have photosensitive
        epilepsy or get motion sick, please be careful out there.
      </p>
      <p class="overlay-note" id="reducedMotionNote" hidden>
        Reduced-motion detected — starting at a gentle drift.
      </p>
      <button id="engage">ENGAGE HYPERDRIVE</button>
      <p class="overlay-keys">↑ ↓ speed · M sound · F fullscreen</p>
    </div>
    <div class="controls">
      <button id="soundToggle" aria-label="Toggle sound" aria-pressed="false">🔇</button>
      <div class="speed-control">
        <label for="speedRange">Hyperspace Speed</label>
        <input
          type="range"
          id="speedRange"
          min="1"
          max="30"
          value="1"
          step="0.1" />
      </div>
      <button id="fullscreenToggle" aria-label="Toggle fullscreen">⛶</button>
    </div>
    <script src="starfield.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>
  </body>
</html>
