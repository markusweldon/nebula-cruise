<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An immersive hyperspace jump journey through the cosmos. You drive." />
    <meta property="og:title" content="Nebula Cruise" />
    <meta property="og:description" content="An immersive hyperspace jump journey through the cosmos. You drive." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nebula-cruise.vercel.app" />
    <meta property="og:image" content="https://nebula-cruise.vercel.app/images/nebula-cruise-screenshot.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nebula-cruise.vercel.app/images/nebula-cruise-screenshot.jpg" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <title>Nebula Cruise | An immersive hyperspace jump journey through the cosmos</title>
  </head>
  <body>
    <div class="scene">
      <div class="wrap">
        <div class="wall wall-right"></div>
        <div class="wall wall-left"></div>
        <div class="wall wall-top"></div>
        <div class="wall wall-bottom"></div>
        <div class="wall wall-back"></div>
      </div>
      <div class="wrap">
        <div class="wall wall-right"></div>
        <div class="wall wall-left"></div>
        <div class="wall wall-top"></div>
        <div class="wall wall-bottom"></div>
        <div class="wall wall-back"></div>
      </div>
    </div>
    <canvas id="stars"></canvas>
    <div class="overlay" id="overlay">
      <h1>🚀 Nebula Cruise</h1>
      <p class="overlay-warning">
        ⚠️ Fast-moving, flashing visuals ahead. If you have photosensitive
        epilepsy or get motion sick, please be careful out there.
      </p>
      <p class="overlay-note" id="reducedMotionNote" hidden>
        Reduced-motion detected — starting at a gentle drift.
      </p>
      <button type="button"id="engage">ENGAGE HYPERDRIVE</button>
      <p class="overlay-keys">↑ ↓ speed · M sound · F fullscreen</p>
    </div>
    <div class="controls">
      <button type="button"id="soundToggle" aria-label="Toggle sound" aria-pressed="false">🔇</button>
      <div class="speed-control">
        <label for="speedRange">Hyperspace Speed</label>
        <input
          type="range"
          id="speedRange"
          min="1"
          max="30"
          value="1"
          step="0.1" />
      </div>
      <select id="theme" aria-label="Galaxy theme"></select>
      <button type="button"id="addGalaxyBtn" aria-label="Add your own galaxy" title="Add your own galaxy">＋</button>
      <button type="button"id="fullscreenToggle" aria-label="Toggle fullscreen">⛶</button>
    </div>
    <div class="addgx" id="addGalaxy" hidden>
      <div class="addgx-card addgx-card--wide">
        <h2>Add a galaxy</h2>
        <div class="gx-search">
          <input type="search" id="gxSearch" placeholder="Search NASA — nebula, galaxy, Hubble…" />
          <button type="button"id="gxSearchBtn">Search</button>
        </div>
        <div class="gx-chips">
          <button type="button"class="gx-chip" data-q="nebula">Nebula</button>
          <button type="button"class="gx-chip" data-q="galaxy">Galaxy</button>
          <button type="button"class="gx-chip" data-q="hubble deep field">Hubble</button>
          <button type="button"class="gx-chip" data-q="webb nebula">Webb</button>
          <button type="button"class="gx-chip" data-q="supernova remnant">Supernova</button>
        </div>
        <div class="gx-results" id="gxResults" aria-live="polite"></div>
        <div class="gx-pager" id="gxPager" hidden>
          <button type="button" id="gxPrev" aria-label="Previous results">‹ Prev</button>
          <span id="gxPageNum" aria-live="polite">Page 1</span>
          <button type="button" id="gxNext" aria-label="More results">Next ›</button>
        </div>
        <div class="addgx-or">— or paste a link / pick a file —</div>
        <label>Image URL
          <input type="url" id="gxUrl" placeholder="https://…/nebula.jpg" />
        </label>
        <label class="addgx-file">Choose a file from your device
          <input type="file" id="gxFile" accept="image/*" />
        </label>
        <p class="addgx-err" id="gxErr" hidden></p>
        <div class="addgx-actions">
          <button type="button"id="gxCancel">Close</button>
          <button type="button"id="gxApply">Add by URL / file</button>
        </div>
      </div>
    </div>
    <script src="galaxies.js"></script>
    <script src="starfield.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>
  </body>
</html>
